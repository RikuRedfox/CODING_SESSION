<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tetris</title>
	<link rel="stylesheet" type="text/css" href="./src/css/style.css">

	<script type="text/javascript" src="./src/js/blocks.js"></script>
</head>
<body>
	<div class="container">
		<div class="gameSpace">
			<div class="game">
				<div class="startGame">
					<h2>Tetris</h2> <br><br>
					<button onclick="setTetris(); document.querySelector('.startGame').style.display = 'none'">Play</button>
				</div>

				<div class="tetris">
					<div class="area"></div>
					<div class='obj'></div>
				</div>
			</div>
			<div class="display">
				<img src="./src/img/logo.png" class="logo">

				<div class="scoreC">
					<fieldset>
						<legend>Score: </legend>
						<p class="score">0</p>
					</fieldset>
				</div>
				<div class="nextC">
					<fieldset>
						<legend>Next: </legend>
						<div class="nextImg"></div>
					</fieldset>
				</div>
				<div class="spdLvlC">
					<fieldset>
						<legend>Speed Level: </legend>
						<p class="spdLvl">1</p>
					</fieldset>
				</div>
			</div>
		</div>
	</div>

	<script type="text/javascript" src="./src/js/main.js"></script>
</body>
</html>
